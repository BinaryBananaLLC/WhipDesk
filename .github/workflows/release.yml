name: Release

# Builds, signs, provenances the desktop-agent packages, then creates the GitHub Release with the
# assets ATTACHED and publishes to npm/brew/scoop/winget. Never runs per-commit.
#
# HOW TO RELEASE (100% in the browser): Actions → Release → "Run workflow" → type the new tag
# (e.g. v0.1.0) → Run. The workflow creates the tag at the selected branch's HEAD, builds, and
# publishes everything. Pushing a v* tag from a terminal works too.
#
# NEVER create releases from the Releases page. This repo has IMMUTABLE RELEASES: publishing seals
# a release the moment it is created — assets can no longer be attached, and the tag name is burned
# FOREVER (deleting the sealed release does not free it). So the release must be created by CI as a
# DRAFT, have every asset attached, and only then be flipped to published. Release notes are
# auto-generated; the body stays editable after publish — only the tag + assets are frozen.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to release, e.g. v0.1.0 — created at the selected branch's HEAD if it doesn't exist yet
        required: true

permissions:
  contents: write # create the release + upload assets
  id-token: write # sign attestations + npm provenance (OIDC)
  attestations: write # actions/attest-build-provenance

env:
  NODE_VERSION: "24"

jobs:
  resolve:
    name: Resolve tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.r.outputs.tag }}
      version: ${{ steps.r.outputs.version }}
      prerelease: ${{ steps.r.outputs.prerelease }}
    steps:
      - id: r
        shell: bash
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          # Require the leading "v". Every install path — install.sh/install.ps1, the Homebrew cask,
          # and the Scoop manifest — builds its download URL as .../download/v<version>/... A bare tag
          # like "0.2.0" 404s everywhere (this is exactly what broke the 0.2.0 release). Reject it here,
          # before five platform builds, instead of shipping a release nobody can install.
          case "$TAG" in
            v*) ;;
            *) echo "::error::Tag '$TAG' must start with 'v' (e.g. v0.2.1). All installers build .../download/v<version>/... URLs, so a bare tag 404s everywhere."; exit 1 ;;
          esac
          VER="${TAG#v}"
          # Fail fast on a malformed tag (e.g. "v.0.0.3" -> ".0.0.3") instead of a cryptic
          # `npm error Invalid version` deep in the build. Tags must be vMAJOR.MINOR.PATCH[-suffix].
          if ! printf '%s' "$VER" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+([-+.].*)?$'; then
            echo "::error::Tag '$TAG' is not vX.Y.Z (parsed version '$VER'). Re-tag as e.g. v0.0.3."
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          # A pre-release semver (contains a hyphen, e.g. v1.2.3-rc.1) builds + publishes the GitHub
          # release only — it skips npm/brew/scoop/winget, mirroring the old "Set as pre-release" tick.
          if printf '%s' "$VER" | grep -q '-'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      # Immutable releases seal on publish AND burn the tag name forever (deleting the release does
      # NOT free it). If someone already published a release for this tag — e.g. by creating it on
      # the Releases page, which is also what pushes the tag — no assets can ever be attached and the
      # tag is unrecoverable. Fail HERE, before 5 platform builds, with instructions, instead of
      # failing cryptically at the upload step. A leftover DRAFT (from a run that died mid-release)
      # is fine: the release job updates it in place.
      - name: Guard - tag must not already have a published release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.r.outputs.tag }}
        run: |
          draft=$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$TAG" --jq '.draft' 2>/dev/null || echo "none")
          if [ "$draft" = "false" ]; then
            echo "::error::A release for $TAG is ALREADY PUBLISHED (immutable: assets can never be added, and even after deletion the tag name '$TAG' can never host a release again). Release the NEXT version instead: Actions -> Release -> Run workflow -> enter the next tag. Never create releases from the Releases page — this workflow creates and publishes the release itself."
            exit 1
          fi

      # Browser-only releases: "Run workflow" with a NEW tag creates it right here, at the HEAD of
      # the branch selected in the dispatch dropdown. (Tags created with GITHUB_TOKEN don't re-trigger
      # this workflow, so there is no double run.) An existing tag is simply rebuilt.
      - name: Create the tag if new (Run-workflow releases)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.r.outputs.tag }}
        run: |
          if gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$TAG" --jq .ref >/dev/null 2>&1; then
            echo "Tag $TAG already exists — rebuilding it."
          else
            gh api "repos/$GITHUB_REPOSITORY/git/refs" -f ref="refs/tags/$TAG" -f sha="$GITHUB_SHA" >/dev/null
            echo "Created tag $TAG at $GITHUB_SHA (HEAD of the selected branch)."
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        include:
          # Mach-O signing uses rcodesign (see apps/desktop-agent/packaging/macos-package.sh) — a
          # version-stable, runner-independent signer — so the macOS runner version no longer affects
          # notarization. This is what fixed the macOS 14/15 codesign "signature invalid" bug on the
          # postject'd SEA binary, and it puts the Intel (x64) leg on the same footing as arm64.
          - os: macos-15 # Apple Silicon
            target: macos-arm64
            arch: arm64
          # macos-13 was retired by GitHub (jobs queue forever waiting for a runner);
          # macos-15-intel is the supported Intel image (available into 2027).
          - os: macos-15-intel # Intel
            target: macos-x64
            arch: x64
          - os: windows-latest
            target: windows-x64
            arch: x64
          - os: ubuntu-latest
            target: linux-x64
            arch: x64
          - os: ubuntu-24.04-arm # free arm64 runner for public repos
            target: linux-arm64
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.resolve.outputs.tag }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: npm ci

      - name: Stamp version (single source of truth)
        shell: bash
        run: npm version "${{ needs.resolve.outputs.version }}" --no-git-tag-version --workspace whipdesk --allow-same-version

      - name: Build SEA (bundle + embed runtime + stage native deps)
        run: npm run build:sea --workspace whipdesk

      # macOS Mach-O signing uses rcodesign instead of Apple's codesign (which mis-signs the large
      # postject'd SEA binary on macOS 14/15 runners so the notary rejects it). Pinned + checksum-verified.
      - name: Install rcodesign (macOS)
        if: startsWith(matrix.os, 'macos')
        shell: bash
        env:
          RCODESIGN_VERSION: "0.29.0"
          RCODESIGN_SHA256: "d98372d5524226ccf9dc0eda03d4e4f5826182dabb2fc3f2bd303ed9113a748d"
        run: |
          url="https://github.com/indygreg/apple-platform-rs/releases/download/apple-codesign/${RCODESIGN_VERSION}/apple-codesign-${RCODESIGN_VERSION}-macos-universal.tar.gz"
          curl -fsSL -o /tmp/rcodesign.tar.gz "$url"
          echo "${RCODESIGN_SHA256}  /tmp/rcodesign.tar.gz" | shasum -a 256 -c -
          tar -C /tmp -xzf /tmp/rcodesign.tar.gz
          echo "/tmp/apple-codesign-${RCODESIGN_VERSION}-macos-universal" >> "$GITHUB_PATH"

      # --- macOS: sign + .pkg + notarize + staple (all conditionals live in the bash script) ---
      - name: Package macOS (.pkg)
        if: startsWith(matrix.os, 'macos')
        shell: bash
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
          ARCH: ${{ matrix.arch }}
          STAGE: ${{ github.workspace }}/apps/desktop-agent/dist/stage
          OUT: ${{ github.workspace }}/dist-out
          APPLE_CERT_P12: ${{ secrets.APPLE_CERT_P12 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
          APPLE_INSTALLER_IDENTITY: ${{ secrets.APPLE_INSTALLER_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          mkdir -p dist-out
          bash apps/desktop-agent/packaging/macos-package.sh

      # --- Windows: authenticode-sign the exe via SignPath (free for OSS), then zip. Skipped with
      # a warning until the SignPath secrets are configured (see docs/RELEASING.md) — the zip still
      # ships with SLSA provenance either way. Signing removes the SmartScreen "unknown publisher"
      # friction that scares users off an unsigned download.
      - name: Check SignPath is configured (Windows)
        if: matrix.os == 'windows-latest'
        id: signcfg
        shell: bash
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
          SIGNPATH_ORG_ID: ${{ secrets.SIGNPATH_ORG_ID }}
        run: |
          if [ -n "$SIGNPATH_API_TOKEN" ] && [ -n "$SIGNPATH_ORG_ID" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::SIGNPATH_API_TOKEN / SIGNPATH_ORG_ID unset — shipping an unsigned Windows exe (see docs/RELEASING.md)."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload unsigned exe for signing
        if: matrix.os == 'windows-latest' && steps.signcfg.outputs.enabled == 'true'
        id: unsigned
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: windows-unsigned
          path: apps/desktop-agent/dist/stage/whipdesk.exe
          if-no-files-found: error

      - name: Submit SignPath signing request
        if: matrix.os == 'windows-latest' && steps.signcfg.outputs.enabled == 'true'
        uses: signpath/github-action-submit-signing-request@b9d91eadd323de506c0c81cf0c7fe7438f3360fd # v2.2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
          project-slug: whipdesk
          signing-policy-slug: release-signing
          github-artifact-id: ${{ steps.unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed

      - name: Replace exe with the signed one
        if: matrix.os == 'windows-latest' && steps.signcfg.outputs.enabled == 'true'
        shell: pwsh
        run: Copy-Item -Force "signed/whipdesk.exe" "apps/desktop-agent/dist/stage/whipdesk.exe"

      - name: Package Windows (.zip)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-out, dist-pkg/whipdesk | Out-Null
          Copy-Item -Recurse -Force "apps/desktop-agent/dist/stage/*" dist-pkg/whipdesk
          Compress-Archive -Path dist-pkg/whipdesk -DestinationPath "dist-out/whipdesk-${{ needs.resolve.outputs.version }}-windows-x64.zip" -Force

      # --- Windows Setup wizard (Inno Setup): wraps the (already SignPath-signed) exe into a
      # per-user installer, then the installer itself goes through SignPath as a second artifact.
      # Runs AFTER "Replace exe with the signed one" so the wizard always ships the signed binary.
      - name: Build Windows installer (Inno Setup)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { choco install innosetup -y --no-progress; }
          & $iscc `
            /DAppVersion=${{ needs.resolve.outputs.version }} `
            /DStageDir="$env:GITHUB_WORKSPACE\apps\desktop-agent\dist\stage" `
            /DOutDir="$env:GITHUB_WORKSPACE\dist-out" `
            /DOutBase="whipdesk-${{ needs.resolve.outputs.version }}-windows-x64-setup" `
            scripts\install\windows-setup.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload unsigned installer for signing
        if: matrix.os == 'windows-latest' && steps.signcfg.outputs.enabled == 'true'
        id: unsignedsetup
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: windows-setup-unsigned
          path: dist-out/whipdesk-${{ needs.resolve.outputs.version }}-windows-x64-setup.exe
          if-no-files-found: error

      - name: Submit SignPath signing request (installer)
        if: matrix.os == 'windows-latest' && steps.signcfg.outputs.enabled == 'true'
        uses: signpath/github-action-submit-signing-request@b9d91eadd323de506c0c81cf0c7fe7438f3360fd # v2.2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
          project-slug: whipdesk
          signing-policy-slug: release-signing
          github-artifact-id: ${{ steps.unsignedsetup.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed-setup

      - name: Replace installer with the signed one
        if: matrix.os == 'windows-latest' && steps.signcfg.outputs.enabled == 'true'
        shell: pwsh
        run: Copy-Item -Force "signed-setup/whipdesk-${{ needs.resolve.outputs.version }}-windows-x64-setup.exe" "dist-out/whipdesk-${{ needs.resolve.outputs.version }}-windows-x64-setup.exe"

      # --- Linux: tar.gz (x64 + arm64 legs share this step) ---
      - name: Package Linux (.tar.gz)
        if: startsWith(matrix.os, 'ubuntu')
        shell: bash
        run: |
          mkdir -p dist-out dist-pkg/whipdesk
          cp -R apps/desktop-agent/dist/stage/. dist-pkg/whipdesk/
          tar -C dist-pkg -czf "dist-out/whipdesk-${{ needs.resolve.outputs.version }}-${{ matrix.target }}.tar.gz" whipdesk

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: assets-${{ matrix.target }}
          path: dist-out/*
          if-no-files-found: error

  release:
    name: Checksums, provenance & release
    needs: [resolve, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: staging
          pattern: assets-*
          merge-multiple: true

      - name: Generate SHA256SUMS.txt
        working-directory: staging
        run: |
          shasum -a 256 whipdesk-* > SHA256SUMS.txt
          cat SHA256SUMS.txt

      # Integrity is anchored by SLSA build provenance (below) + published SHA256SUMS. No GPG.
      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: staging/whipdesk-*

      # Immutable releases seal a release on publish, so assets MUST be attached while it is still a
      # draft. Create/update the draft with every asset, then flip it to published in the next step.
      - name: Create draft release with assets
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          draft: true # published explicitly below, AFTER assets are attached
          prerelease: ${{ needs.resolve.outputs.prerelease }}
          generate_release_notes: true
          files: |
            staging/whipdesk-*
            staging/SHA256SUMS.txt
          fail_on_unmatched_files: true

      # Seal it: the assets are now attached, so publishing produces a complete immutable release.
      - name: Publish the release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.resolve.outputs.tag }}
        run: gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false

  sync-version:
    name: Commit version bump back to the branch
    # The build/publish jobs stamp package.json to the tag's version IN THE RUNNER only, so the
    # checked-in version drifts behind the released one (e.g. repo says 0.1.0 after v0.1.1 shipped)
    # — and an agent run from source then reports an old version, which the whipdesk.com dashboard
    # flags as "update available". After a successful release, write the released version back to
    # the branch the tag was cut from (package.json + lockfile + src/version.ts) so the repo, npm,
    # and the release tag all agree. GITHUB_TOKEN pushes don't re-trigger this workflow (it only
    # fires on v* tags / manual dispatch), so there is no loop.
    needs: [resolve, release]
    if: ${{ needs.resolve.outputs.prerelease == 'false' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # Dispatch runs know the branch the tag was cut from; tag pushes fall back to the default.
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref_name || github.event.repository.default_branch }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Stamp version + regenerate version.ts + lockfile
        run: |
          npm version "${{ needs.resolve.outputs.version }}" --no-git-tag-version --workspace whipdesk --allow-same-version
          npm install --package-lock-only --ignore-scripts
          node apps/desktop-agent/scripts/sync-version.mjs
      - name: Commit + push if anything changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json apps/desktop-agent/package.json apps/desktop-agent/src/version.ts
          if git diff --cached --quiet; then
            echo "Repo already at ${{ needs.resolve.outputs.version }} — nothing to commit."
          else
            git commit -m "chore: sync version to ${{ needs.resolve.outputs.tag }} [skip ci]"
            git pull --rebase
            git push
          fi

  npm-publish:
    name: Publish to npm (provenance)
    needs: [resolve, release]
    if: ${{ needs.resolve.outputs.prerelease == 'false' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.resolve.outputs.tag }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - name: Stamp version
        run: npm version "${{ needs.resolve.outputs.version }}" --no-git-tag-version --workspace whipdesk --allow-same-version
      - name: Publish (prepublishOnly builds dist/agent.cjs)
        run: npm publish --provenance --workspace whipdesk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  homebrew:
    name: Update Homebrew cask
    # Points the tap's cask at the notarized .pkg of this release, so `brew install --cask whipdesk`
    # tracks every release alongside npm. No-ops (with a warning) until the tap token is configured.
    needs: [resolve, release]
    if: ${{ needs.resolve.outputs.prerelease == 'false' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check the tap is configured
        id: cfg
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -n "$HOMEBREW_TAP_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::HOMEBREW_TAP_TOKEN unset — skipping Homebrew cask update (see docs/RELEASING.md)."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve version + macOS checksums from the release
        if: steps.cfg.outputs.enabled == 'true'
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.resolve.outputs.tag }}
        run: |
          VERSION="${TAG#v}"
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern SHA256SUMS.txt --dir .
          ARM_SHA=$(awk -v f="whipdesk-$VERSION-macos-arm64.pkg" '$2==f{print $1}' SHA256SUMS.txt)
          X64_SHA=$(awk -v f="whipdesk-$VERSION-macos-x64.pkg" '$2==f{print $1}' SHA256SUMS.txt)
          if [ -z "$ARM_SHA" ] || [ -z "$X64_SHA" ]; then
            echo "::error::macOS .pkg checksums not found in SHA256SUMS.txt"; exit 1
          fi
          {
            echo "version=$VERSION"
            echo "arm_sha=$ARM_SHA"
            echo "x64_sha=$X64_SHA"
          } >> "$GITHUB_OUTPUT"

      - name: Render + push the cask
        if: steps.cfg.outputs.enabled == 'true'
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          ARM_SHA: ${{ steps.meta.outputs.arm_sha }}
          X64_SHA: ${{ steps.meta.outputs.x64_sha }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          # A brand-new tap repo has NO commits, so actions/checkout (and any default-branch checkout)
          # dies with "couldn't find remote ref refs/heads/main" (git exit 128) — which is exactly how
          # this job failed. Clone by hand instead: an empty clone is fine, and we create `main`
          # locally when it's missing, so the FIRST release bootstraps the tap and later ones update it.
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/BinaryBananaLLC/homebrew-whipdesk.git" tap
          cd tap
          git checkout main 2>/dev/null || git checkout -b main
          mkdir -p Casks
          cat > Casks/whipdesk.rb <<RUBY
          cask "whipdesk" do
            arch arm: "arm64", intel: "x64"

            version "$VERSION"
            sha256 arm:   "$ARM_SHA",
                   intel: "$X64_SHA"

            url "https://github.com/BinaryBananaLLC/WhipDesk/releases/download/v#{version}/whipdesk-#{version}-macos-#{arch}.pkg"
            name "WhipDesk"
            desc "Remote desktop and AI-agent status alerts, controlled from a mobile browser"
            homepage "https://whipdesk.com/"

            depends_on macos: :monterey

            pkg "whipdesk-#{version}-macos-#{arch}.pkg"

            uninstall pkgutil: "com.binarybanana.whipdesk"

            zap trash: "~/.whipdesk"
          end
          RUBY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/whipdesk.rb
          if git rev-parse HEAD >/dev/null 2>&1 && git diff --cached --quiet; then
            echo "Cask already up to date."
          else
            git commit -m "whipdesk $VERSION"
            git push -u origin main
          fi

  winget:
    name: Update winget manifest
    # Publishes the Windows zip as a winget "portable" package (BinaryBanana.WhipDesk) via a PR to
    # microsoft/winget-pkgs. Needs WINGET_TOKEN (a classic PAT with public_repo on a fork of
    # winget-pkgs) — no-ops with a warning until configured. The FIRST version must be submitted
    # manually with `wingetcreate new` (see docs/RELEASING.md); this job automates every update.
    needs: [resolve, release]
    if: ${{ needs.resolve.outputs.prerelease == 'false' }}
    runs-on: windows-latest
    steps:
      - name: Check winget is configured
        id: cfg
        shell: bash
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          if [ -n "$WINGET_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::WINGET_TOKEN unset — skipping winget manifest update (see docs/RELEASING.md)."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish with winget-releaser
        if: steps.cfg.outputs.enabled == 'true'
        uses: vedantmgoyal9/winget-releaser@4ffc7888bffd451b357355dc214d43bb9f23917e # v2
        with:
          identifier: BinaryBanana.WhipDesk
          release-tag: ${{ needs.resolve.outputs.tag }}
          installers-regex: 'whipdesk-.*-windows-x64\.zip$'
          token: ${{ secrets.WINGET_TOKEN }}

  scoop:
    name: Update Scoop bucket
    # Mirrors the Homebrew job for Windows devs: renders the manifest into
    # BinaryBananaLLC/scoop-whipdesk so `scoop bucket add whipdesk ...; scoop install whipdesk`
    # tracks every release. No-ops with a warning until SCOOP_TAP_TOKEN is configured.
    needs: [resolve, release]
    if: ${{ needs.resolve.outputs.prerelease == 'false' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check the bucket is configured
        id: cfg
        env:
          SCOOP_TAP_TOKEN: ${{ secrets.SCOOP_TAP_TOKEN }}
        run: |
          if [ -n "$SCOOP_TAP_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::SCOOP_TAP_TOKEN unset — skipping Scoop bucket update (see docs/RELEASING.md)."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve version + Windows checksum from the release
        if: steps.cfg.outputs.enabled == 'true'
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.resolve.outputs.tag }}
        run: |
          VERSION="${TAG#v}"
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern SHA256SUMS.txt --dir .
          WIN_SHA=$(awk -v f="whipdesk-$VERSION-windows-x64.zip" '$2==f{print $1}' SHA256SUMS.txt)
          if [ -z "$WIN_SHA" ]; then
            echo "::error::Windows zip checksum not found in SHA256SUMS.txt"; exit 1
          fi
          {
            echo "version=$VERSION"
            echo "win_sha=$WIN_SHA"
          } >> "$GITHUB_OUTPUT"

      - name: Render + push the manifest
        if: steps.cfg.outputs.enabled == 'true'
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          WIN_SHA: ${{ steps.meta.outputs.win_sha }}
          SCOOP_TAP_TOKEN: ${{ secrets.SCOOP_TAP_TOKEN }}
        run: |
          set -euo pipefail
          # Same empty-repo guard as the Homebrew job: a fresh bucket repo has no `main` ref, so
          # actions/checkout dies with "couldn't find remote ref refs/heads/main" (git exit 128).
          # Clone by hand (empty is fine) and create `main` when missing so the first release bootstraps it.
          git clone "https://x-access-token:${SCOOP_TAP_TOKEN}@github.com/BinaryBananaLLC/scoop-whipdesk.git" bucket
          cd bucket
          git checkout main 2>/dev/null || git checkout -b main
          mkdir -p bucket
          cat > bucket/whipdesk.json <<JSON
          {
            "version": "$VERSION",
            "description": "Remote desktop and AI-agent status alerts, controlled from a mobile browser",
            "homepage": "https://whipdesk.com/",
            "license": "AGPL-3.0",
            "architecture": {
              "64bit": {
                "url": "https://github.com/BinaryBananaLLC/WhipDesk/releases/download/v$VERSION/whipdesk-$VERSION-windows-x64.zip",
                "hash": "$WIN_SHA",
                "extract_dir": "whipdesk"
              }
            },
            "bin": "whipdesk.exe",
            "checkver": { "github": "https://github.com/BinaryBananaLLC/WhipDesk" },
            "autoupdate": {
              "architecture": {
                "64bit": {
                  "url": "https://github.com/BinaryBananaLLC/WhipDesk/releases/download/v\$version/whipdesk-\$version-windows-x64.zip"
                }
              }
            }
          }
          JSON
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bucket/whipdesk.json
          if git rev-parse HEAD >/dev/null 2>&1 && git diff --cached --quiet; then
            echo "Manifest already up to date."
          else
            git commit -m "whipdesk $VERSION"
            git push -u origin main
          fi
          PUBLISHED_SHA=$(git rev-parse HEAD)
          RAW_URL="https://raw.githubusercontent.com/BinaryBananaLLC/scoop-whipdesk/${PUBLISHED_SHA}/bucket/whipdesk.json"
          curl -fsSL "$RAW_URL" -o published.json
          grep -F '"version": '"\"$VERSION\"" published.json >/dev/null
          echo "Validated published manifest at $RAW_URL"
