name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions: {}

jobs:
  cla:
    name: CLA Assistant
    if: github.event_name == 'pull_request_target' || (github.event.issue.pull_request && (contains(github.event.comment.body, 'I have read the CLA Document and I hereby sign the CLA') || github.event.comment.body == 'recheck'))
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      issues: write
      pull-requests: write
      statuses: write
    steps:
      - uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-document: 'https://github.com/BinaryBananaLLC/WhipDesk/blob/main/CLA.md'
          path-to-signatures: 'signatures/cla.json'
          branch: 'cla-signatures'
          allowlist: 'bot*,dependabot[bot]'
