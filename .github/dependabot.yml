version: 2
updates:
  # Workspace deps: one weekly PR for all minor/patch bumps, separate PRs for majors.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  # Keep the SHA-pinned actions fresh (Dependabot updates the pin + the version comment).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
